name: Update README Progress

on:
  push:
    paths:
      - '*'

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Count problem folders
        id: count
        run: |
          count=$(find . -maxdepth 1 -type d -name "*-*" | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          sed -i "s/Total Problems Solved: .*/Total Problems Solved: ${{ steps.count.outputs.count }}/" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Updated problem count" || echo "No changes"
          git push

